<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --vert: #39ff14;
            --accent: #39ff14;
            --accent-texte: #062200;
            --accent-10: rgba(57,255,20,0.10);
            --accent-12: rgba(57,255,20,0.12);
            --accent-15: rgba(57,255,20,0.15);
            --accent-18: rgba(57,255,20,0.18);
            --accent-35: rgba(57,255,20,0.35);
            --accent-55: rgba(57,255,20,0.55);
            --vert-sombre: #1c7a0c;
            --fond: #0c0f0c;
            --carte: rgba(14, 18, 14, 0.86);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: transparent;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* ============================================================
           PANNEAU DE RÉGLAGES — moderne / néon vert
        ============================================================ */
        #ecran-connexion {
            position: relative;
            background: var(--carte);
            backdrop-filter: blur(24px);
            border-radius: 22px;
            padding: 22px 24px 24px;
            max-width: 430px; width: 90%;
            max-height: calc(100vh - 16px);
            overflow-y: auto; overflow-x: hidden;
            overscroll-behavior: contain;
            color: #fff; z-index: 100;
            border: 1px solid var(--accent-18);
        }
        /* halo néon animé qui respire — la signature du panneau */
        #ecran-connexion::before {
            content: ""; position: absolute; inset: -2px; border-radius: 24px; z-index: -1;
            background: linear-gradient(130deg, var(--accent), transparent 40%, transparent 60%, var(--accent));
            opacity: .35; filter: blur(14px);
            animation: respire 4s ease-in-out infinite;
        }
        @keyframes respire { 0%,100%{opacity:.22} 50%{opacity:.5} }

        #ecran-connexion::-webkit-scrollbar { width: 8px; }
        #ecran-connexion::-webkit-scrollbar-track { background: transparent; }
        #ecran-connexion::-webkit-scrollbar-thumb { background: var(--accent-35); border-radius: 999px; }
        #ecran-connexion::-webkit-scrollbar-thumb:hover { background: var(--accent-55); }

        input, button, select, .ligne-toggle, .interrupteur, .curseur { -webkit-app-region: no-drag; }

        .entete-reglages {
            -webkit-app-region: drag; cursor: move;
            display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
        }
        .logo-pastille {
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 14px var(--accent);
            flex: none;
        }
        h1 {
            margin: 0; font-family: 'Space Grotesk', sans-serif;
            font-size: 26px; font-weight: 700; letter-spacing: 3px;
            text-transform: uppercase; color: #fff;
        }
        h1 b { color: var(--accent); font-weight: 700; }
        .sous-titre { font-size: 12px; margin: 2px 0 20px 26px; color: #7c857c; letter-spacing: .5px; }

        .champ { margin: 9px 0; text-align: left; }
        .champ > label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--accent);
            display: block; margin-bottom: 7px;
        }
        .champ small { color: #6b746b; font-weight: 400; text-transform: none; letter-spacing: 0; }

        input[type="text"], select {
            width: 100%; padding: 12px 14px; box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 12px; font-size: 14px;
            background-color: rgba(0,0,0,0.45); color: #fff;
            font-family: 'Poppins', sans-serif;
            transition: border-color .2s, box-shadow .2s;
        }
        input[type="text"]:focus, select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-15);
        }
        select { cursor: pointer; }
        select option { background-color: #11160f; color: #fff; }

        .ligne-volume { display:flex; justify-content:space-between; align-items:center; }
        .ligne-volume b { color: var(--accent); font-weight: 700; font-size: 13px; }
        input[type="range"] { width: 100%; cursor: pointer; margin-top: 10px; accent-color: var(--accent); }

        /* Qui est en ligne */
        #bloc-en-ligne {
            display: none; text-align: left; margin-top: 16px;
            padding: 13px 15px; border-radius: 12px;
            background: rgba(0,0,0,0.4); border: 1px solid var(--accent-12);
        }
        #bloc-en-ligne .titre-ligne {
            display: flex; align-items: center; gap: 9px;
            font-family: 'Space Grotesk'; font-size: 12px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase; color: #e6ebe6;
        }
        .point-vivant {
            width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 0 0 var(--accent-55); animation: ping 1.8s infinite;
        }
        @keyframes ping {
            0% { box-shadow: 0 0 0 0 var(--accent-55); }
            70% { box-shadow: 0 0 0 7px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }
        #liste-pseudos { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 7px; }
        .puce-pseudo {
            background: var(--accent-10); border: 1px solid var(--accent-35);
            color: #eef0ee; font-size: 12px; font-weight: 600;
            padding: 4px 11px; border-radius: 999px;
        }
        .puce-pseudo.occupe {
            background: rgba(255,90,90,0.12); border-color: rgba(255,90,90,0.4); color: #ffd2d2;
        }
        .puce-pseudo.afk {
            background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.18); color: #c4c8c4; opacity: .8;
        }

        #bouton-action {
            width: 100%; padding: 14px; margin-top: 22px;
            background: var(--accent); color: var(--accent-texte);
            border: none; border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; cursor: pointer;
            transition: transform .15s, box-shadow .2s, background .2s;
        }
        #bouton-action:hover { transform: translateY(-2px); box-shadow: 0 8px 22px var(--accent-35); }
        #statut { font-size: 12px; color: #aaaaaa; margin-top: 13px; height: 15px; text-align: center; transition: .3s; }

        /* Palette de couleurs du menu */
        #palette, .pastille-couleur, #couleur-perso { -webkit-app-region: no-drag; }
        #palette { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
        .pastille-couleur {
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.22);
            transition: transform .12s, border-color .12s;
        }
        .pastille-couleur:hover { transform: scale(1.15); }
        .pastille-couleur.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }
        #couleur-perso {
            -webkit-appearance: none; appearance: none;
            width: 30px; height: 30px; padding: 0; border: none; border-radius: 50%;
            background: none; cursor: pointer;
        }
        #couleur-perso::-webkit-color-swatch-wrapper { padding: 0; }
        #couleur-perso::-webkit-color-swatch { border: 2px dashed rgba(255,255,255,0.45); border-radius: 50%; }

        /* Champ avec bouton à droite (pseudo) */
        .champ-inline { display: flex; gap: 8px; }
        .champ-inline input { flex: 1; }
        .btn-mini {
            -webkit-app-region: no-drag;
            padding: 0 16px; border-radius: 10px; cursor: pointer;
            border: 1px solid var(--accent-35); background: var(--accent-10); color: #fff;
            font-family: 'Space Grotesk'; font-weight: 700; font-size: 13px;
            transition: background .2s;
        }
        .btn-mini:hover { background: var(--accent-15); }

        /* Sélecteur visuel de zone d'apparition (= un écran) */
        .zone-picker, .zone { -webkit-app-region: no-drag; }
        .zone-picker {
            position: relative; width: 100%; height: 140px;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.18); border-radius: 14px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
            gap: 8px; padding: 12px; box-sizing: border-box;
        }
        .zone {
            border: 2px dashed rgba(255,255,255,0.35); border-radius: 8px;
            background: transparent; cursor: pointer; padding: 0;
            transition: border-color .15s, background .15s, box-shadow .15s;
        }
        .zone:hover { border-color: var(--accent); background: var(--accent-10); }
        .zone.active {
            border-style: solid; border-color: var(--accent);
            background: var(--accent-35); box-shadow: 0 0 12px var(--accent-35);
        }

        /* Interrupteur (Ne pas déranger) */
        .ligne-toggle {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 11px 14px;
            font-size: 14px; font-weight: 600; color: #e6ebe6;
        }
        .interrupteur { position: relative; width: 44px; height: 24px; flex: none; }
        .interrupteur input { opacity: 0; width: 0; height: 0; }
        .curseur { position: absolute; inset: 0; background: #3a3a44; border-radius: 999px; transition: .2s; cursor: pointer; }
        .curseur::before {
            content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px;
            background: #fff; border-radius: 50%; transition: .2s;
        }
        .interrupteur input:checked + .curseur { background: var(--accent); }
        .interrupteur input:checked + .curseur::before { transform: translateX(20px); }

        /* ============================================================
           SPLASH — avatar cerclé vert + pseudo simple + rebond
           (fond transparent : le bureau/jeu derrière reste visible)
        ============================================================ */
        #ecran-blague {
            display: none; align-items: center; justify-content: center;
            width: 100%; height: 100%;
            pointer-events: none; position: absolute; inset: 0;
            box-sizing: border-box; padding: 30px;
        }

        #conteneur-media {
            display: inline-flex; flex-direction: column; align-items: center;
            max-width: 92%;
            opacity: 0; transform: translateY(25px) scale(.85);
        }
        #ecran-blague.entre #conteneur-media {
            animation: apparition .55s cubic-bezier(.18,1.5,.4,1) forwards;
        }
        @keyframes apparition {
            0%   { opacity: 0; transform: translateY(25px) scale(.85); }
            60%  { opacity: 1; transform: translateY(-7px) scale(1.04); }
            100% { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* léger flottement (le rebond doux en continu) */
        #flotteur { display: flex; flex-direction: column; align-items: center; animation: flotte 2.8s ease-in-out infinite; }
        @keyframes flotte { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

        /* En-tête auteur : avatar vert + pseudo simple */
        #entete-auteur {
            display: none; align-items: center; gap: 12px; margin-bottom: 14px;
        }
        #avatar-auteur {
            width: 54px; height: 54px; border-radius: 50%;
            border: 3px solid var(--vert);
            box-shadow: 0 0 16px var(--vert), inset 0 0 6px rgba(57,255,20,.4);
            object-fit: cover; background: #0a0a0a; flex: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 800; color: var(--vert);
        }
        #avatar-auteur img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        #nom-auteur {
            font-size: 22px; font-weight: 700; color: #fff;
            -webkit-text-stroke: 3px #000;
            paint-order: stroke fill;
            text-shadow: 0 2px 6px rgba(0,0,0,.6);
        }

        /* Média */
        #zone-media video, #zone-media img, #zone-media iframe, #zone-media canvas {
            max-width: 100%; max-height: 380px; display: block;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 18px 45px rgba(0,0,0,0.75);
            background: #000;
        }

        /* Texte / légende */
        #texte-box {
            display: none; margin-top: 16px;
            font-size: 22px; font-weight: 700; color: #fff; text-align: center;
            padding: 9px 22px; border-radius: 14px;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 6px 20px rgba(0,0,0,.5);
            max-width: 80vw;
        }

        /* UI audio */
        .ui-audio {
            display: flex; align-items: center; gap: 14px;
            background: rgba(10,12,10,0.92); border: 2px solid var(--vert);
            border-radius: 16px; padding: 18px 34px;
            color: var(--vert); font-size: 20px; font-weight: 800;
            box-shadow: 0 0 25px rgba(57,255,20,0.4);
        }
        .ui-audio .icone-audio { font-size: 30px; }

        /* MÉDIA LIBRE (fond vert détouré ou PNG transparent) : pas de cadre */
        #ecran-blague.media-libre #zone-media video,
        #ecran-blague.media-libre #zone-media img,
        #ecran-blague.media-libre #zone-media canvas {
            border: none; box-shadow: none; background: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,.45));
        }

        /* PLEIN ÉCRAN : le média couvre TOUT l'écran, bord à bord */
        #ecran-blague.plein { padding: 0; }
        #ecran-blague.plein #conteneur-media { max-width: 100%; width: 100vw; height: 100vh; }
        #ecran-blague.plein #flotteur {
            width: 100vw; height: 100vh; justify-content: center;
            animation: none; /* pas de flottement en plein écran */
        }
        #ecran-blague.plein #zone-media { width: 100vw; height: 100vh; }
        #ecran-blague.plein #zone-media video,
        #ecran-blague.plein #zone-media img,
        #ecran-blague.plein #zone-media iframe,
        #ecran-blague.plein #zone-media canvas {
            width: 100vw; height: 100vh; max-width: none; max-height: none;
            object-fit: contain;        /* affiche tout le média a la bonne taille, sans zoom ni rognage */
            border: none; box-shadow: none; border-radius: 0;
        }
        /* nom et texte passent en surimpression par-dessus le média */
        #ecran-blague.plein #entete-auteur {
            position: fixed; top: 26px; left: 26px; margin: 0; z-index: 5;
        }
        #ecran-blague.plein #texte-box {
            position: fixed; bottom: 34px; left: 50%; transform: translateX(-50%);
            margin: 0; z-index: 5;
        }

        @media (prefers-reduced-motion: reduce) {
            #ecran-blague.entre #conteneur-media { animation: none; opacity: 1; transform: none; }
            #flotteur { animation: none; }
        }
    </style>
</head>
<body>

    <!-- ===================== RÉGLAGES ===================== -->
    <div id="ecran-connexion">
        <div class="entete-reglages">
            <div class="logo-pastille"></div>
            <h1>Live <b>Chat</b></h1>
        </div>
        <p class="sous-titre">Prépare ton interface</p>

        <div class="champ">
            <label>Ton pseudo <small>(affiché dans la liste des connectés)</small></label>
            <div class="champ-inline">
                <input type="text" id="pseudo" placeholder="Ex : Théo">
                <button id="btn-pseudo" class="btn-mini" onclick="appliquerPseudo()">OK</button>
            </div>
        </div>

        <div class="champ">
            <label>Adresse du serveur</label>
            <input type="text" id="adresse-cerveau" value="http://35.202.5.248:3000" placeholder="http://ip:3000">
        </div>

        <div class="champ">
            <label>Zone d'apparition <small>(clique une zone)</small></label>
            <div class="zone-picker" id="zone-picker">
                <button class="zone" data-pos="haut-gauche" style="grid-column:1;grid-row:1"></button>
                <button class="zone" data-pos="haut-centre" style="grid-column:2;grid-row:1"></button>
                <button class="zone" data-pos="haut-droite" style="grid-column:3;grid-row:1"></button>
                <button class="zone" data-pos="centre"      style="grid-column:2;grid-row:2"></button>
                <button class="zone" data-pos="bas-gauche"  style="grid-column:1;grid-row:3"></button>
                <button class="zone" data-pos="bas-centre"  style="grid-column:2;grid-row:3"></button>
                <button class="zone" data-pos="bas-droite"  style="grid-column:3;grid-row:3"></button>
            </div>
        </div>

        <div class="champ">
            <label>Écran d'affichage <small>(si plusieurs moniteurs)</small></label>
            <select id="choix-ecran" onchange="appliquerEcranChoisi()">
                <option value="auto">Auto (écran principal)</option>
            </select>
        </div>

        <div class="champ">
            <label class="ligne-volume">Volume des médias <b id="valeur-volume">50%</b></label>
            <input type="range" id="curseur-volume" min="0" max="1" step="0.05" value="0.5"
                   oninput="document.getElementById('valeur-volume').innerText=Math.round(this.value*100)+'%'; localStorage.setItem('volume',this.value); volumeChoisi=parseFloat(this.value);">
        </div>

        <div class="champ">
            <label>Voix de lecture (TTS)</label>
            <div class="champ-inline">
                <select id="choix-voix" onchange="definirVoix(this.value)"></select>
                <button class="btn-mini" onclick="testerVoix()">Test</button>
            </div>
        </div>

        <div class="champ">
            <div class="ligne-toggle">
                <span>🔕 Ne pas déranger</span>
                <label class="interrupteur">
                    <input type="checkbox" id="toggle-dnd" onchange="basculerDND(this.checked)">
                    <span class="curseur"></span>
                </label>
            </div>
        </div>

        <div class="champ">
            <label>Couleur du menu</label>
            <div id="palette"></div>
        </div>

        <div id="bloc-en-ligne">
            <div class="titre-ligne"><span class="point-vivant"></span> <span id="compteur-en-ligne">0 en ligne</span></div>
            <div id="liste-pseudos"></div>
        </div>

        <button id="bouton-action" onclick="gererConnexion()">Lancer l'overlay</button>
        <div id="statut"></div>
    </div>

    <!-- ===================== SPLASH ===================== -->
    <div id="ecran-blague">
        <div id="conteneur-media">
            <div id="flotteur">
                <div id="entete-auteur">
                    <div id="avatar-auteur"></div>
                    <div id="nom-auteur"></div>
                </div>
                <div id="zone-media"></div>
                <div id="texte-box"></div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        let socket = null;
        let volumeChoisi = 0.5;
        let estConnecte = false;
        let chronometreTempsMax, chronometreDisparition;
        let fileDAttente = [];
        let ecranOccupe = false;
        let pleinActif = false;
        let boucleChroma = null;
        let couleurAccentActuelle = '#39ff14';
        let positionActuelle = 'centre';
        let nePasDeranger = false;
        let estInactif = false;
        let voixChoisie = '';
        let audioTtsActuel = null;

        const PRESETS_COULEUR = ['#39ff14','#3b9dff','#b14bff','#ff4bd1','#ff7a1a','#ff3b3b','#1ad1ff','#ffd93b','#f5f5f5'];

        function appliquerCouleurMenu(hex) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            const root = document.documentElement.style;
            const a = (al) => `rgba(${r},${g},${b},${al})`;
            root.setProperty('--accent', hex);
            root.setProperty('--accent-10', a(0.10));
            root.setProperty('--accent-12', a(0.12));
            root.setProperty('--accent-15', a(0.15));
            root.setProperty('--accent-18', a(0.18));
            root.setProperty('--accent-35', a(0.35));
            root.setProperty('--accent-55', a(0.55));
            const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
            root.setProperty('--accent-texte', lum > 0.6 ? '#0a0a0a' : '#ffffff');
            couleurAccentActuelle = hex;
            document.querySelectorAll('.pastille-couleur').forEach(p =>
                p.classList.toggle('active', p.dataset.color === hex.toLowerCase()));
        }

        function choisirCouleur(hex) {
            localStorage.setItem('couleurMenu', hex);
            appliquerCouleurMenu(hex);
        }

        function construirePalette() {
            const cont = document.getElementById('palette');
            cont.innerHTML = '';
            PRESETS_COULEUR.forEach(c => {
                const d = document.createElement('div');
                d.className = 'pastille-couleur';
                d.dataset.color = c.toLowerCase();
                d.style.background = c; d.title = c;
                d.onclick = () => choisirCouleur(c);
                cont.appendChild(d);
            });
            const inp = document.createElement('input');
            inp.type = 'color'; inp.id = 'couleur-perso'; inp.title = 'Couleur personnalisée';
            inp.oninput = () => choisirCouleur(inp.value);
            cont.appendChild(inp);
        }

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('pseudo'))  document.getElementById('pseudo').value = localStorage.getItem('pseudo');
            if (localStorage.getItem('adresse')) document.getElementById('adresse-cerveau').value = localStorage.getItem('adresse');
            if (localStorage.getItem('volume')) {
                volumeChoisi = parseFloat(localStorage.getItem('volume'));
                document.getElementById('curseur-volume').value = volumeChoisi;
                document.getElementById('valeur-volume').innerText = Math.round(volumeChoisi*100)+'%';
            }
            positionActuelle = localStorage.getItem('position') || 'centre';
            initZonePicker();

            nePasDeranger = localStorage.getItem('dnd') === '1';
            document.getElementById('toggle-dnd').checked = nePasDeranger;

            const couleurSauvee = localStorage.getItem('couleurMenu') || '#39ff14';
            construirePalette();
            appliquerCouleurMenu(couleurSauvee);
            const cp = document.getElementById('couleur-perso');
            if (cp) cp.value = couleurSauvee;

            chargerEcrans();

            voixChoisie = localStorage.getItem('voix') || '';
            chargerVoix();
            if (typeof window.speechSynthesis !== 'undefined') {
                window.speechSynthesis.onvoiceschanged = chargerVoix;
            }

            // Le panneau de réglages est visible au lancement
            ipcRenderer.send('reglages-etat', true);
        });

        // Remplit le menu des écrans branchés et applique le choix sauvegardé
        async function chargerEcrans() {
            try {
                const ecrans = await ipcRenderer.invoke('lister-ecrans');
                const sel = document.getElementById('choix-ecran');
                const choixSauve = localStorage.getItem('ecranId') || 'auto';
                sel.innerHTML = '<option value="auto">Auto (écran principal)</option>';
                ecrans.forEach(e => {
                    const o = document.createElement('option');
                    o.value = String(e.id);
                    o.textContent = `Écran ${e.index} — ${e.largeur}×${e.hauteur}` + (e.primaire ? ' (principal)' : '');
                    sel.appendChild(o);
                });
                // Si l'écran sauvegardé n'existe plus (débranché), on retombe sur auto
                sel.value = [...sel.options].some(o => o.value === choixSauve) ? choixSauve : 'auto';
                appliquerEcranChoisi();
            } catch (e) { /* écrans indisponibles : on garde auto */ }
        }

        function appliquerEcranChoisi() {
            const v = document.getElementById('choix-ecran').value;
            localStorage.setItem('ecranId', v);
            ipcRenderer.send('choisir-ecran', (v === 'auto') ? null : Number(v));
            changerPosition();
        }

        function changerPosition() {
            localStorage.setItem('position', positionActuelle);
            ipcRenderer.send('changer-position', positionActuelle);
        }

        // Sélecteur visuel de zone
        function initZonePicker() {
            document.querySelectorAll('#zone-picker .zone').forEach(z => {
                z.onclick = () => definirPosition(z.dataset.pos);
                z.classList.toggle('active', z.dataset.pos === positionActuelle);
            });
        }
        function definirPosition(pos) {
            positionActuelle = pos;
            localStorage.setItem('position', pos);
            document.querySelectorAll('#zone-picker .zone').forEach(z =>
                z.classList.toggle('active', z.dataset.pos === pos));
            ipcRenderer.send('changer-position', pos);
        }

        // Renommer à chaud (sans relancer l'appli)
        function appliquerPseudo() {
            const p = document.getElementById('pseudo').value.trim() || 'Overlay';
            localStorage.setItem('pseudo', p);
            if (socket && estConnecte) {
                socket.emit('identification', p);
                flashStatut('Pseudo mis à jour ✓');
            }
        }

        // Ne pas déranger
        function basculerDND(actif) {
            nePasDeranger = actif;
            localStorage.setItem('dnd', actif ? '1' : '0');
            if (socket && estConnecte) socket.emit('etat-dnd', actif);
            flashStatut(actif ? 'Ne pas déranger activé 🔕' : 'Réception réactivée 🔔');
        }

        function flashStatut(txt) {
            const s = document.getElementById('statut');
            if (!s) return;
            s.innerText = txt;
            s.style.color = couleurAccentActuelle;
        }

        function echapper(t) {
            return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function gererConnexion() {
            volumeChoisi = parseFloat(document.getElementById('curseur-volume').value);
            if (estConnecte) { cacherMenuReglages(); return; }

            const adresse = document.getElementById('adresse-cerveau').value.trim();
            const pseudo  = document.getElementById('pseudo').value.trim() || 'Overlay';
            const statut  = document.getElementById('statut');
            if (!adresse) { statut.innerText = "Adresse du serveur manquante."; return; }

            localStorage.setItem('pseudo', pseudo);
            localStorage.setItem('adresse', adresse);
            localStorage.setItem('volume', volumeChoisi);
            localStorage.setItem('position', positionActuelle);

            statut.innerText = "Connexion en cours...";
            socket = io(adresse);

            socket.on('connect', () => {
                socket.emit('identification', pseudo);
                socket.emit('etat-dnd', nePasDeranger);
                socket.emit('etat-inactif', estInactif);
                estConnecte = true;
                statut.innerText = "Connecté au serveur 🟢";
                statut.style.color = couleurAccentActuelle;
                document.getElementById('bouton-action').innerText = "Fermer les réglages";
                document.getElementById('ecran-blague').style.display = 'flex';
                document.getElementById('bloc-en-ligne').style.display = 'block';
                changerPosition();
                cacherMenuReglages();
            });

            socket.on('connect_error', () => {
                statut.innerText = "Impossible de joindre le serveur.";
                statut.style.color = "#ff4c4c";
            });

            socket.on('liste-utilisateurs', (liste) => {
                document.getElementById('compteur-en-ligne').innerText = liste.length + " en ligne";
                document.getElementById('liste-pseudos').innerHTML = liste.map(u => {
                    // compat : ancien format (chaîne) ou nouveau format {nom, dnd, inactif}
                    const nom = (typeof u === 'string') ? u : u.nom;
                    const dnd = (typeof u === 'object') && u.dnd;
                    const afk = (typeof u === 'object') && u.inactif;
                    let icone = '🟢', cls = 'puce-pseudo', titre = 'Disponible';
                    if (dnd)      { icone = '🔕'; cls = 'puce-pseudo occupe'; titre = 'Ne pas déranger'; }
                    else if (afk) { icone = '💤'; cls = 'puce-pseudo afk';    titre = 'Inactif'; }
                    return `<span class="${cls}" title="${titre}">${icone} ${echapper(nom)}</span>`;
                }).join('');
            });

            socket.on('nouvelle-blague', (charge) => {
                if (nePasDeranger) return; // mode Ne pas déranger : on ignore
                if (typeof charge === 'string') charge = { lienMedia: charge, texte: arguments[1] || '', options: {}, auteur: null };
                fileDAttente.push(charge);
                lireProchaineBlague();
            });
        }

        function cacherMenuReglages() {
            document.getElementById('ecran-connexion').style.display = 'none';
            ipcRenderer.send('clic-traversant', true);
            ipcRenderer.send('reglages-etat', false);
        }

        ipcRenderer.on('afficher-reglages', () => {
            ipcRenderer.send('clic-traversant', false);
            ipcRenderer.send('reglages-etat', true);
            document.getElementById('ecran-connexion').style.display = 'block';
            chargerEcrans();
        });

        ipcRenderer.on('appliquer-parametres', (e, r) => {
            if (r.position) { definirPosition(r.position); }
            if (r.volume !== undefined) {
                volumeChoisi = parseFloat(r.volume)/100;
                document.getElementById('curseur-volume').value = volumeChoisi;
                document.getElementById('valeur-volume').innerText = Math.round(volumeChoisi*100)+'%';
                localStorage.setItem('volume', volumeChoisi);
            }
        });

        // Inactivité (AFK) reçue depuis le process principal
        ipcRenderer.on('etat-inactivite', (e, inactif) => {
            estInactif = inactif;
            if (socket && estConnecte) socket.emit('etat-inactif', inactif);
        });

        // Synthèse vocale (TTS)
        function appliquerVoix(u) {
            u.lang = 'fr-FR';
            if (voixChoisie) {
                const v = window.speechSynthesis.getVoices().find(x => x.voiceURI === voixChoisie);
                if (v) { u.voice = v; u.lang = v.lang; }
            }
        }

        function parler(texte) {
            try {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(texte);
                appliquerVoix(u);
                u.volume = volumeChoisi;
                u.rate = 1; u.pitch = 1;
                u.onend = () => { clearTimeout(chronometreTempsMax); nettoyerEcran(); };
                window.speechSynthesis.speak(u);
            } catch (err) { /* synthèse indisponible : on ignore */ }
        }

        function chargerVoix() {
            const sel = document.getElementById('choix-voix');
            if (!sel) return;
            const voix = window.speechSynthesis.getVoices().slice();
            // on met les voix françaises en premier
            voix.sort((a, b) => {
                const fa = a.lang.toLowerCase().startsWith('fr') ? 0 : 1;
                const fb = b.lang.toLowerCase().startsWith('fr') ? 0 : 1;
                return fa - fb || a.name.localeCompare(b.name);
            });
            sel.innerHTML = '<option value="">Voix par défaut</option>' +
                voix.map(v => `<option value="${echapper(v.voiceURI)}">${echapper(v.name)} (${v.lang})</option>`).join('');
            sel.value = voixChoisie || '';
        }

        function definirVoix(uri) {
            voixChoisie = uri;
            localStorage.setItem('voix', uri);
        }

        function testerVoix() {
            try {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance("Ceci est un test de la voix sélectionnée.");
                appliquerVoix(u);
                u.volume = volumeChoisi || 1;
                window.speechSynthesis.speak(u);
            } catch (e) {}
        }

        // Joue un audio de voix IA (ElevenLabs) reçu du serveur
        function jouerAudioTts(src) {
            try {
                const a = new Audio(src);
                a.volume = volumeChoisi;
                a.onended = () => { clearTimeout(chronometreTempsMax); nettoyerEcran(); };
                audioTtsActuel = a;
                a.play().catch(() => {});
            } catch (e) {}
        }

        function lireProchaineBlague() {
            if (ecranOccupe || fileDAttente.length === 0) return;
            ecranOccupe = true;
            afficherMedia(fileDAttente.shift());
        }

        function arreterChroma() {
            if (boucleChroma) { cancelAnimationFrame(boucleChroma); boucleChroma = null; }
        }

        function nettoyerEcran() {
            const splash = document.getElementById('ecran-blague');
            arreterChroma();
            try { window.speechSynthesis.cancel(); } catch (e) {}
            if (audioTtsActuel) { try { audioTtsActuel.pause(); } catch (e) {} audioTtsActuel = null; }
            document.getElementById('conteneur-media').style.opacity = '0';
            splash.classList.remove('entre');

            chronometreDisparition = setTimeout(() => {
                document.getElementById('zone-media').innerHTML = "";
                document.getElementById('texte-box').style.display = 'none';
                document.getElementById('entete-auteur').style.display = 'none';
                splash.classList.remove('media-libre', 'plein');
                if (pleinActif) { ipcRenderer.send('mode-plein-ecran', false); pleinActif = false; }
                changerPosition();
                ecranOccupe = false;
                lireProchaineBlague();
            }, 450);
        }

        function afficherMedia(charge) {
            const lienMedia = charge.lienMedia || "";
            const texte     = charge.texte || "";
            const options   = charge.options || {};
            const auteur    = charge.auteur || null;

            const splash   = document.getElementById('ecran-blague');
            const zoneMedia= document.getElementById('zone-media');
            const elTexte  = document.getElementById('texte-box');
            const entete   = document.getElementById('entete-auteur');
            const avatar   = document.getElementById('avatar-auteur');
            const nom      = document.getElementById('nom-auteur');

            zoneMedia.innerHTML = "";
            splash.classList.remove('media-libre', 'plein');

            // Fond vert OU transparent -> média sans cadre
            const mediaLibre = !!(options.vert || options.transparent);
            if (mediaLibre) splash.classList.add('media-libre');

            // Plein écran
            if (options.plein) {
                splash.classList.add('plein');
                pleinActif = true;
                ipcRenderer.send('mode-plein-ecran', true);
            } else {
                changerPosition();
            }

            // En-tête auteur (avatar vert + pseudo simple)
            if (auteur && auteur.avatar) {
                avatar.innerHTML = `<img src="${auteur.avatar}" alt="">`;
                nom.innerText = auteur.nom;
                entete.style.display = 'inline-flex';
            } else {
                // anonyme : on n'affiche ni avatar ni nom, juste le contenu
                entete.style.display = 'none';
            }

            // Le média
            let tempsMax = 7000;
            if (lienMedia) {
                const lienMin = lienMedia.toLowerCase();
                const regexYoutube = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
                const matchYoutube = lienMedia.match(regexYoutube);

                if (matchYoutube && matchYoutube[1]) {
                    zoneMedia.innerHTML = `<iframe width="560" height="315" src="https://www.youtube-nocookie.com/embed/${matchYoutube[1]}?autoplay=1&controls=0&rel=0&disablekb=1" allow="autoplay; encrypted-media" style="border:none;"></iframe>`;
                    tempsMax = 30000;
                }
                else if (lienMin.match(/\.(mp3|wav|ogg)/)) {
                    zoneMedia.innerHTML = `<div class="ui-audio"><span class="icone-audio">🔊</span><span>LIVE CHAT</span><audio autoplay id="lecteur-audio" style="display:none"><source src="${lienMedia}"></audio></div>`;
                    const l = document.getElementById('lecteur-audio'); l.volume = volumeChoisi; tempsMax = 30000;
                    l.onended = () => { clearTimeout(chronometreTempsMax); nettoyerEcran(); };
                }
                else if (lienMin.match(/\.(mp4|webm|mov)/)) {
                    if (options.vert) {
                        afficherVideoFondVert(lienMedia, zoneMedia);
                    } else {
                        zoneMedia.innerHTML = `<video autoplay id="lecteur-video"><source src="${lienMedia}"></video>`;
                        const l = document.getElementById('lecteur-video'); l.volume = volumeChoisi;
                        l.onended = () => { clearTimeout(chronometreTempsMax); nettoyerEcran(); };
                    }
                    tempsMax = 30000;
                }
                else {
                    // image
                    if (options.vert) {
                        afficherImageFondVert(lienMedia, zoneMedia);
                    } else {
                        zoneMedia.innerHTML = `<img src="${lienMedia}">`;
                    }
                    tempsMax = 7000;
                }
            }

            // Texte
            if (texte) { elTexte.innerText = texte; elTexte.style.display = 'inline-block'; }
            else { elTexte.style.display = 'none'; }

            // Lecture vocale (TTS) : on garde l'écran tant que ça parle
            if (charge.ttsAudio) {
                tempsMax = Math.max(tempsMax, 60000);
                jouerAudioTts(charge.ttsAudio);   // voix IA (ElevenLabs)
            } else if (options.tts && texte) {
                tempsMax = Math.max(tempsMax, 60000); // sécurité ; le vrai arrêt vient de la fin de la voix
                parler(texte);                    // repli : voix locale Windows
            }

            // Animation d'entrée (rebond)
            document.getElementById('conteneur-media').style.opacity = '1';
            void splash.offsetWidth;
            splash.classList.add('entre');

            chronometreTempsMax = setTimeout(() => { nettoyerEcran(); }, tempsMax);
        }

        // ====== CHROMA KEY (retire le vert) — pixels verts -> transparents ======
        function estVert(r, g, b) { return g > 90 && g > r * 1.35 && g > b * 1.35; }

        function detourerCanvas(ctx, w, h) {
            const image = ctx.getImageData(0, 0, w, h);
            const d = image.data;
            for (let i = 0; i < d.length; i += 4) {
                if (estVert(d[i], d[i+1], d[i+2])) d[i+3] = 0;
            }
            ctx.putImageData(image, 0, 0);
        }

        function afficherVideoFondVert(lienMedia, zoneMedia) {
            const video = document.createElement('video');
            video.crossOrigin = 'anonymous';
            video.autoplay = true; video.volume = volumeChoisi; video.src = lienMedia;
            video.style.display = 'none';
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            zoneMedia.appendChild(video); zoneMedia.appendChild(canvas);

            video.onloadeddata = () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; dessiner(); };
            video.onended = () => { clearTimeout(chronometreTempsMax); nettoyerEcran(); };

            function dessiner() {
                if (video.paused || video.ended) { boucleChroma = requestAnimationFrame(dessiner); return; }
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                try { detourerCanvas(ctx, canvas.width, canvas.height); } catch (e) {}
                boucleChroma = requestAnimationFrame(dessiner);
            }
        }

        function afficherImageFondVert(lienMedia, zoneMedia) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            zoneMedia.appendChild(canvas);
            img.onload = () => {
                canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                try { detourerCanvas(ctx, canvas.width, canvas.height); } catch (e) {}
            };
            img.src = lienMedia;
        }
    </script>
</body>
